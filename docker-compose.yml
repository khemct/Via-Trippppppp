version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: viatrip
      POSTGRES_USER: viatrip
      POSTGRES_PASSWORD: viatrip_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viatrip"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://viatrip:viatrip_dev@db:5432/viatrip
      JWT_SECRET: dev-jwt-secret-change-in-production
      PORT: 3001
    volumes:
      - ./backend/src:/app/src
      - ./backend/sql:/app/sql
      - ./backend/package.json:/app/package.json

volumes:
  pgdata:
