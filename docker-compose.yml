services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: viatrip
      POSTGRES_USER: viatrip
      POSTGRES_PASSWORD: viatrip_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viatrip"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://viatrip:viatrip_dev@db:5432/viatrip
      JWT_SECRET: dev-jwt-secret-change-in-production
      PORT: 3001
      EMAIL_USER: viatriptester@gmail.com
      EMAIL_PASS: eyza kwtj skit qbrb
      GOOGLE_MAPS_API_KEY: your_key_here
    volumes:
      - ./backend/src:/app/src
      - ./backend/sql:/app/sql
      - ./backend/package.json:/app/package.json

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/package.json:/app/package.json

volumes:
  pgdata:
